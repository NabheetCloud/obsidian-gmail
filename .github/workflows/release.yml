name: Release

# Tag a version matching manifest.json (e.g. `git tag 0.1.0 && git push origin 0.1.0`)
# to build the plugin, generate provenance attestations for the release assets,
# and publish a GitHub release with main.js, manifest.json, and styles.css.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write # create the release + upload assets
  id-token: write # required for provenance attestations
  attestations: write # write the attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            main.js manifest.json styles.css
